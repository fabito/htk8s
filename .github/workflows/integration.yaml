name: Integration Test

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - 'master'

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pre-create hostPath directory
        run: |
          sudo mkdir -p /opt/htpc
          sudo chmod -R 777 /opt/htpc

      - name: Setup k3s
        uses: fenio/setup-k3s@v2
        with:
          k3s-args: '--write-kubeconfig-mode 644 --disable-network-policy'
          version: 'v1.32.3+k3s1'

      - name: Wait for Traefik CRDs
        run: |
          echo "Waiting for Traefik CRDs to be available..."
          timeout=120
          elapsed=0
          while ! kubectl get crd ingressroutes.traefik.io >/dev/null 2>&1; do
            if [ $elapsed -ge $timeout ]; then
              echo "Timeout waiting for Traefik CRDs"
              kubectl get crds
              exit 1
            fi
            echo "Waiting for IngressRoute CRD... ($elapsed/$timeout seconds)"
            sleep 5
            elapsed=$((elapsed + 5))
          done
          echo "Traefik CRDs are available!"
          kubectl get crds | grep traefik

      - name: Deploy apps
        run: |
          kubectl apply -k overlays/x86

      - name: Wait for apps to be ready
        run: |
          echo "Waiting for all deployments in htpc namespace to be ready..."
          kubectl wait --for=condition=available deployment --all -n htpc --timeout=600s

      - name: Debug on failure
        if: failure()
        run: |
          kubectl get pods -n htpc
          kubectl get events -n htpc
          kubectl get all -n htpc
